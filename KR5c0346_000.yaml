front:
  text: 太極真人雜丹藥方松八大凡男子所傳受志心堅意護静身心用藥州土固濟如法依鑪匱用火斤兩燒鍜萬不失一本方不許傳不公不道不信不義之人所作鑪藥仍須空房幽室肅静閑居婦人不見雞犬不鳴其方一世傳受一人具方及爐匱藥味逐件如後青腰使者帝女血鵬砂北庭
  hash: sha256:c1da2d02d05935b7a27c1f10fe2bbc72ce646453dff428b8af29f92bc8d30f79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0346_HFL_000-001a, image: hfl/0599/0599-036.png}
body:
  text: 右件藥於乳鉢中細研如粉先將研了北庭於桑柴灰汁内煑令乾其藥先將前二味於金鍋子中用汞三兩於汞上用前諸藥末五兩蓋之用文火五兩養之三日滿後用大武火鍜之令三十斤可消止七斤即住用一箇泥鍋子盛前金鍋子依前用文武鍜令前金鍋子内成汁令熟取出瀉安挺槽中上用濕紙蓋之教冷取出入好鍋子中熟鎔瀉出入少許鹽花即瀉出打成鍋子用文火養令熟遂下汞一斤文火養武火鍜令赤立成寶其物色狀似紫磨之物用七五日是其位八六日是其訣同前青腰使者帝女血金星預金線各五兩右件藥細研如麵入瓶子中以六一泥固濟瓶子如法上用浄瓦子蓋之依前固濟如法用文火養之三日火用四兩日四時上火養日滿後放冷取出細研入六味藥同研如粉右件藥先將七味細研如粉入瓶子内養七日滿後用瓶子下流九孔子六一固濟如法了後上流爐中流得藥知多少後即用果子香茶用白綵四尺九寸祭了入文火爐中養七日滿後每孔子作一兩同前鹽花三兩硝石二兩舶上紅礬一分鵬砂一兩好者大期礬舶上者一兩黄丹一分右件藥皆是州土者為妙真者萬不失一又入六味同研如粉和合一處依前入瓶子内固濟如法用文火養之三七日滿後取出即用大火鍛之令赤十斤火養之三七日滿後取出即用大火鍜之令赤十斤火可銷七斤即住入陰爐養之一日先將汞一斤入於鍋子中文火令熟後下藥一分一餐飯間又下二分即住以成寶也八九是其位四五是其訣金公法紅紫柳雞已上各用一兩皆是州土鉛砂子二兩黄丹一兩鹽花一兩右件藥細研如粉先固濟瓶子如法遂入藥於瓶子内上用瓦子蓋之依前如法固濟用文火養之七日日滿後入流爐中流其爐高二尺四寸用火二十斤斷其瓶子是好者下用九孔子六一固濟如法從早朝至夜即住其藥无定或得一千或得五百其有雌黄色丸如粟粒許大將此藥於小瓶子内養用硝石可重五兩已來每日用火四兩養經二七日滿後須志心祭之用五色綵各一丈三尺用果子香茶酒脯棗子等物祭之切在虔誠萬不失一其藥祭了每一丸子作一兩物訣定是二女一男也流爐高二尺四寸九孔子如釵脚大同前銀星預一分鵬砂二兩汞一兩鐵一分雞半兩崑崙一分右件藥於乳鉢中細研如粉入匱中是虎匱也用文火養經二十四日每日用火二十四兩養滿後加火二十八兩亦是文武火養五七日即住其藥如紫金色更入三味藥立見寶也不可傳之上通神明下及九泉即在志懇臨入三味藥時生藥用鹽花黄丹血石三味藥細研如粉合和前件藥同處先將其物二斤下甘堝中上用藥一分將青竹篦攪之二百下更下藥一錢熟攪之將挺池燒令赤下少許油瀉出入槽子内用濕紙蓋之其物狀如山澤妙也用匱法同前鵬汞紅波血紅石英右件藥入乳鉢中細研如粉入黄芽匱中養一七日用文火養之後入陽爐用武火每日四十二兩養七日滿即入陰爐三日滿後放冷取出先將一斤入鍋子中次下藥二錢二斤下四錢用柳枝子攪之可三百來下即更入藥又攪三百下即住先將挺槽子安火上炙令熱下少許油次瀉出金汁上用濕紙蓋之法别行鵬黄紫霜嬰兒砂子大期各等分右件藥於乳鉢中研三百下令如粉即住先將瓶子固濟如法後入諸藥末下瓶子内上用瓦子蓋之令乾遂將藥瓶子文火養二七日滿後放冷武火鍛令通赤二十斤可銷十斤已來即住先將前件物下甘堝子内成汁下藥一錢攪之一百下即更下藥半錢攪又即得十兩用藥一錢半七五之位是其數也六三是其訣也同前雞汞流磁雄青血右件藥細研如粉用瓶盛合子為匱合内用白礬為匱文火養令乾後入太陽匱中養經七日每日用火一斤四兩其一轉止二轉止三轉即住其藥青黑色也又却入乳鉢中細研如粉入碌半兩依前入瓶子内同養一日見陽爐内用火三斤文火盡取令冷用武火鍛之十斤銷可七斤已來即住放冷取出先將前件物入甘堝子内成汁後下藥二斤物用藥二錢三斤下藥五錢先燒挺池令熱遂下少許油瀉出金汁亦用濕紙蓋之成寶也同前熟流雞白虎腦雌黄花日魂硝石聖石各用半兩是州土者爲妙雞舶上妙右件藥細研如粉用白礬為匱匱須煉白礬三遍方始為匱文火每日用火四兩武足文生養七日後武火二七日滿即入用祭爐法用果子香茶白肉脯酒五色綵各長一丈二尺依此方祭之萬不失一同前流青帝女血帝男精汞鵬庭右件藥細研如粉可三百下即住後又研一百下即入白虎匱中養十日自滿後取出細研二百下即入黄芽匱中養二七日滿後用武火鍛之武盡文生其法是也臨取時用八六是其位便其訣也武火鍛之法即别更有四十八訣别行藥成後每兩三斤同前血紫帝女白腦鵬鐵波右件藥入乳鉢中細研如粉即入聖石匱中養三十一日滿後取出依前細研如粉又入三味流硃鵬入三味了依前入匱中養七日滿後用武火鍛令通赤放冷取出臨用之時其法别行六數是其位三五是其訣别行臨藥每日用文火武火六兩遂鍊聖石三斤六兩入浄鉢中以清水二斗浸取清煎令乾乾後入瓶子盛置竹中間流一孔如鵝子許大入諸藥末於孔内上以瓦子蓋之即入陽爐養之了臨時用乳鉢中細研如粉用醋調之塗於物上立成寶每斤用一兩賀鵬雞汞黄硝波玉右件藥入乳鉢中細研如粉入瓶子内用六一泥固濟如法瓦子蓋之依前固濟如法先文火六兩養七日滿後取出細研如粉不得著風更入六味藥同研如法依前入瓶子中養二七日滿後臨用時一斤入一錢藥使桑杖子攪三十來度即得其訣别行三六是其位七八是其訣同前黄丹硫黄鹽花血石白礬大期同前鵬汞波柳紫右件藥入乳鉢中細研如粉即入青龍匱中上匱用湖南瓶子入匱於瓶子中用六一泥固濟文武火養七日每日用火二十四兩滿後入四味藥同養流紅艮磁石右件四味以前藥和同一處研四百下即住依前入匱中養二七日文武火滿後用武火鍛令通赤三十斤火可銷八九即住放冷取出入陰爐七日滿後取出臨用之時先將前件物入於甘堝子内鎔成汁遂下藥一錢用桑篦攪三百下即住用匱陰爐青龍匱獨紫白血流花汞鹽黄花法别行右件藥入黄芽一兩汞一兩同研如粉了即入陰爐中養二七日每日用文武火六兩六時上火不令冷是日數足放冷用武火鍛令通赤一伏時法别行日足却入陽爐也先時將其物燒熱令赤一斤用一分藥醋調之取其物塗藥三五遍即成至寶也大期波斯黄礬血汞砂子鹽花右件藥先將前七味細研如粉入桑柴匱中養七日後取出細研如粉入前二味同研如粉依前匱中養二七日後用文武火鍛之十斤令銷七斤即住冷後取出先將赤物鎔成汁即下藥末一錢半用青竹攪之三百下即住瀉出成寶也同前流汞血紅瓦玉腦黄花聖石右件藥於乳鉢内細研如粉入瓶子中養七日滿後入二味同前藥養二七日用武火鍛之令赤後用之時先將其物入甘堝子中鎔成金汁後下藥每斤入藥一錢將挺池燒熱下少許油瀉出物將濕紙蓋之立成寶也又白朱黄花團流六兩好朱砂二兩細研金芽少許和朱砂同研入黄丹六兩蓋之臨時訣行見寶丹砂好者二兩硫黄二兩先將黑虎後成入鶴頂足傾出成寶丹用紅大期波玉黄血石金線雞屎崑崙紫右件藥出在廣州白鐵出晋州瓦子在池州柳花出舶上帝女血出武都青腰使者出在金公山白腦出在湖南紅紫大波血黄花曾右件藥入乳鉢内細研如粉先將瓶子固濟入前件藥用瓦子蓋之如法固濟了文武火養一七日後武火鍛之其火十斤止七斤已上即住其藥成也先將古錢不限多少用米醋浸七日後取出入火内燒三遍即上藥其藥用好醋調之其法别行熟鐵薄青腰使者青礬血石金線黄礬右件藥文武火煮三日後將熟鐵葉一片用前藥米醋調之上一遍如此上蓋此藥了即住用鹽花塗之燒一遍即得成寶其法别行血石柳花醋石鵬砂右件物好醋煮之七日滿後將其藥出依前細研如粉入生血石半兩醋調之一依前法同前青礬醋腦青腰使者帝女血雞屎大期右件藥細研如麵用酒煮五日滿後又將藥細研如粉用醋調之將前件物火内燒令赤塗藥上了燒一遍出一遍又塗一上藥又燒一遍如此五度即得成寶也同前凡二法緑礬血石鐵玉雌右先將此藥於乳鉢中細研如粉用好醋調之先將物燒赤後上藥一依火法若不依火法即不成上一遍塗一遍如此三五度用鹽洗出即成寶也粉霜艮土碌嬰白礬爲匱細研右諸藥末入匱養三七日滿後取出先文武火養七日半足後即將出其赤物鍋子中汁了每斤下後著藥二錢先著半錢桑木杖攪三十下一錢半藥攪二十下瀉出成寶也生鐵血波大期同鐵波紫血同金鵬瓦雄同血金雄紫同大血紫雞同鐵雞紅血右件藥物等與臨時法别行合六一泥法牡礪赤石脂白石脂蟻糞等分鹽一兩好酸醋一升右用紙一張浸三日臼中舂令細熟即固濟瓶子令乾取如法即入諸藥紅礬大期玉黄血金線礬柳絮礬雞屎礬崑崙紫礬等藥出在廣州鐵礬出晋州土碌銅碌出金公山帝女血出在武都自然朱砂北庭鵬砂青腰使者空青硝石聖石黄芽硫黄鉛精沙子砒霜黄花醋石馬牙硝紅石英磁石紫石英白石英黄石英紫石粉紅頂鶴頂黄芽匱白虎匱黑虎匱黄匱懸針匱立制匱糝制匱湧泉匱天生黄芽匱已上藥物並使州土者上水火鼎純陽鼎同名太極真人雜丹藥方
